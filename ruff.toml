# Simplified Ruff configuration
target-version = "py38"
line-length = 88
fix = true

exclude = [
    ".git",
    ".mypy_cache",
    ".ruff_cache",
    ".venv",
    "__pycache__",
    "build",
    "dist",
    "migrations",
    "venv",
]

[lint]
# Basic rule set - avoiding line length checks as requested
select = [
    "F",    # pyflakes
    "E",    # pycodestyle errors (except E501)
    "W",    # pycodestyle warnings
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
]

ignore = [
    "E501",  # Line too long (skip as requested)
    "E402",  # Module level import not at top of file
    "F401",  # Imported but unused
    "F403",  # Star imports
    "B008", # Do not perform function call in argument defaults - GLOBALLY IGNORED
    "B904",
]

[lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
"test_*.py" = ["F401", "F403"]
"tests/*.py" = ["F401", "F403"]
